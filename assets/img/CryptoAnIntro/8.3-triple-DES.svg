<svg xmlns="http://www.w3.org/2000/svg" width="500" height="220" viewBox="0 0 500 220">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="black"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <!-- Top outer box -->
  <rect x="95" y="12" width="290" height="48" fill="none" stroke="black" stroke-width="1.8"/>

  <!-- Top inner boxes -->
  <rect x="105" y="20" width="72" height="32" fill="none" stroke="black" stroke-width="1.5"/>
  <rect x="194" y="20" width="88" height="32" fill="none" stroke="black" stroke-width="1.5"/>
  <rect x="299" y="20" width="72" height="32" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Top labels -->
  <text x="141" y="41" text-anchor="middle" dominant-baseline="middle" font-family="serif" font-size="22" font-style="italic">DES</text>
  <text x="238" y="41" text-anchor="middle" dominant-baseline="middle" font-family="serif" font-size="20" font-style="italic">
    DES<tspan baseline-shift="super" font-size="14">−1</tspan>
  </text>
  <text x="335" y="41" text-anchor="middle" dominant-baseline="middle" font-family="serif" font-size="22" font-style="italic">DES</text>

  <!-- Arrows inside top -->
  <line x1="177" y1="36" x2="194" y2="36" stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="282" y1="36" x2="299" y2="36" stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Bottom outer box -->
  <rect x="95" y="145" width="290" height="48" fill="none" stroke="black" stroke-width="1.8"/>

  <!-- Bottom inner boxes -->
  <rect x="105" y="153" width="72" height="32" fill="none" stroke="black" stroke-width="1.5"/>
  <rect x="194" y="153" width="72" height="32" fill="none" stroke="black" stroke-width="1.5"/>
  <rect x="283" y="153" width="88" height="32" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Bottom labels -->
  <text x="141" y="174" text-anchor="middle" dominant-baseline="middle" font-family="serif" font-size="20" font-style="italic">
    DES<tspan baseline-shift="super" font-size="14">−1</tspan>
  </text>
  <text x="230" y="174" text-anchor="middle" dominant-baseline="middle" font-family="serif" font-size="22" font-style="italic">DES</text>
  <text x="327" y="174" text-anchor="middle" dominant-baseline="middle" font-family="serif" font-size="20" font-style="italic">
    DES<tspan baseline-shift="super" font-size="14">−1</tspan>
  </text>

  <!-- Arrows inside bottom (right to left) -->
  <line x1="283" y1="169" x2="266" y2="169" stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="194" y1="169" x2="177" y2="169" stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Left plaintext input path -->
  <text x="22" y="101" font-family="serif" font-size="24" fill="red">Plaintext</text>
  <line x1="66" y1="168" x2="66" y2="106" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="66" y1="168" x2="95" y2="168" stroke="black" stroke-width="1.5"/>
  <line x1="66" y1="32" x2="95" y2="32" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="66" y1="32" x2="66" y2="86" stroke="black" stroke-width="1.5"/>

  <!-- Right ciphertext output path -->
  <text x="364" y="101" font-family="serif" font-size="24" fill="blue">Ciphertext</text>
  <line x1="385" y1="32" x2="412" y2="32" stroke="black" stroke-width="1.5"/>
  <line x1="412" y1="32" x2="412" y2="86" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="412" y1="169" x2="385" y2="169" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="412" y1="169" x2="412" y2="104" stroke="black" stroke-width="1.5"/>

  <!-- K1 -->
  <text x="151" y="104" text-anchor="middle" font-family="serif" font-size="22" fill="red">
    <tspan font-style="italic">K</tspan><tspan baseline-shift="sub" font-size="15">1</tspan>
  </text>
  <line x1="155" y1="86" x2="155" y2="61" stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="155" y1="116" x2="155" y2="143" stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- K2 -->
  <text x="242" y="104" text-anchor="middle" font-family="serif" font-size="22" fill="red">
    <tspan font-style="italic">K</tspan><tspan baseline-shift="sub" font-size="15">2</tspan>
  </text>
  <line x1="246" y1="86" x2="246" y2="61" stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="246" y1="116" x2="246" y2="143" stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- K3 -->
  <text x="322" y="104" text-anchor="middle" font-family="serif" font-size="22" fill="red">
    <tspan font-style="italic">K</tspan><tspan baseline-shift="sub" font-size="15">3</tspan>
  </text>
  <line x1="326" y1="86" x2="326" y2="61" stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="326" y1="116" x2="326" y2="143" stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>
</svg>