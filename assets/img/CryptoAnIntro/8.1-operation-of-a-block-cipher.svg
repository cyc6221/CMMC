<svg xmlns="http://www.w3.org/2000/svg" width="480" height="140" viewBox="0 0 480 140">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="black" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Box -->
  <rect x="160" y="48" width="180" height="32" fill="none" stroke="black" stroke-width="1.5" />

  <!-- Center text -->
  <text x="250" y="69" text-anchor="middle" font-family="serif" font-size="18" fill="blue">
    Cipher function <tspan font-style="italic">e</tspan>
  </text>

  <!-- Left label -->
  <text x="40" y="76" font-family="serif" font-size="18" fill="red">
    Secret key <tspan font-style="italic">k</tspan>
  </text>

  <!-- Top label -->
  <text x="250" y="28" font-family="serif" font-size="18" fill="red">
    Plaintext block <tspan font-style="italic">m</tspan>
  </text>

  <!-- Bottom label -->
  <text x="250" y="118" font-family="serif" font-size="18" fill="blue">
    Ciphertext block <tspan font-style="italic">c</tspan>
  </text>

  <!-- Left arrow -->
  <line x1="130" y1="64" x2="158" y2="64" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Top arrow -->
  <line x1="244" y1="10" x2="244" y2="46" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Bottom arrow -->
  <line x1="244" y1="82" x2="244" y2="106" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
</svg>